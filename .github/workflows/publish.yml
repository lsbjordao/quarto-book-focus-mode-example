on:
  push:
    branches: [main]

name: Render Quarto Book

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install extension
        run: quarto add lsbjordao/quarto-book-focus-mode --no-prompt

      - name: Render project
        run: quarto render
